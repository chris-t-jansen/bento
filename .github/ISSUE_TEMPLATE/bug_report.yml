name: Bug report
description: Report something that doesn't work the way you expected.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Before submitting, please make sure you're on the latest release. The more detail you give, the faster this can be diagnosed.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A short, clear description of the bug.
      placeholder: "When I run `bento convert ...`, X happens instead of Y."
    validations:
      required: true

  - type: input
    id: bento-version
    attributes:
      label: Bento version
      description: Output of `bento --version`.
      placeholder: "bento 1.0.0"
    validations:
      required: true

  - type: input
    id: ffmpeg-version
    attributes:
      label: FFmpeg version
      description: First line of `ffmpeg -version`.
      placeholder: "ffmpeg version 7.0.2 ..."
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other (describe below)
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command you ran
      description: The full Bento command, including any flags. Paste it as code.
      render: shell
      placeholder: "bento convert ./input --config bento.toml"
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Config file
      description: The relevant config file (`bento.toml` or whatever you passed via `--config`). Trim it to the minimum that reproduces the bug if you can.
      render: toml
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Paste any error output, stack traces, or relevant log lines.
      render: shell
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help — screenshots, related issues, container vs. native install, codec specifics, etc.
    validations:
      required: false
