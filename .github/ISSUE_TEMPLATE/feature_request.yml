name: Feature request
description: Suggest a new feature or an improvement to an existing one.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Before filing, please skim [DESIGN.md](../../DESIGN.md) and existing issues to see if this has been discussed.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and where does Bento fall short today?
      placeholder: "I want to do X, but Bento currently only supports Y."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? CLI flags, config options, example invocations — be as concrete as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they didn't work for you.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, related tools, sample configs, anything that helps explain the use case.
    validations:
      required: false
