version: 2
updates:
  # Keep Rust dependencies fresh.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      cargo-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Keep GitHub Actions versions fresh.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
